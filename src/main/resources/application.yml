# =============================================================================
# graph-api — Application Configuration
# =============================================================================

quarkus:
  application:
    name: graph-api
    version: 0.1.0

  http:
    port: 8080
    cors:
      origins: "http://localhost:5173"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Content-Type,Authorization,Accept

  # Neo4j
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:lugand}
    devservices:
      enabled: false

  # GraphQL
  smallrye-graphql:
    ui:
      always-include: true

  log:
    level: INFO
    category:
      "com.graph":
        level: DEBUG

"%dev":
  quarkus:
    log:
      level: DEBUG

