# =============================================================================
# graph-api — Application Configuration
# =============================================================================

quarkus:
  application:
    name: graph-api
    version: 0.1.0

  http:
    port: 8080
    cors:
      origins: "http://localhost:5173"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Content-Type,Authorization,Accept

  # Neo4j
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:lugand00}
    devservices:
      enabled: false

  # PostgreSQL
  datasource:
    db-kind: postgresql
    username: ${POSTGRES_USER:lugand}
    password: ${POSTGRES_PASSWORD:lugand}
    jdbc:
      url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/graphdb}
    devservices:
      enabled: false

  # Flyway — schema migrations
  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # GraphQL
  smallrye-graphql:
    ui:
      always-include: true

  log:
    level: INFO
    category:
      "com.graph":
        level: DEBUG

"%dev":
  quarkus:
    log:
      level: DEBUG

